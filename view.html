<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدات الطلاب | AMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { 
            --primary-color: #06467A; 
            --secondary-color: #3498db; 
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --light-color: #F5F6FA; 
            --dark-color: #2D3436; 
            --gray-text: #666;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--light-color); margin: 0; padding: 0; color: var(--dark-color); }
        
        /* Navigation Bar */
        .navbar {
            background-color: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-btn {
            text-decoration: none;
            color: var(--dark-color);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            background: #f0f0f5;
            transition: 0.3s;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .teacher-select-container { margin-left: 20px; padding-left: 20px; border-left: 2px solid #eee; display: flex; align-items: center; gap: 10px;}
        #globalTeacherSelect { padding: 8px; border-radius: 5px; border: 1px solid var(--primary-color); font-weight: bold; color: var(--primary-color); font-family: 'Tajawal'; cursor: pointer; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 20px 20px; }
        
        header {
            background-color: var(--primary-color); color: white; padding: 25px;
            border-radius: 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        
        /* Search Box */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-container input { width: 100%; padding: 12px 45px 12px 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(6, 70, 122, 0.1); }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; }

        /* Students Table */
        #students-list { background: white; padding: 10px; border-radius: 15px; box-shadow: var(--card-shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px; text-align: right; border-bottom: 1px solid #f0f0f0; }
        th { background-color: #fafafa; color: var(--primary-color); font-weight: 700; font-size: 15px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8f9ff; }
        
        .view-btn {
            background-color: var(--primary-color); color: white;
            border: none; padding: 10px 18px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            transition: 0.2s; display: flex; align-items: center; gap: 8px;
            width: fit-content;
        }
        .view-btn:hover { background-color: #04365f; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; overflow: hidden;
            background-color: rgba(0,0,0,0.6);
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fff; padding: 0;
            border-radius: 20px; width: 95%; max-width: 700px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
            max-height: 90vh; display: flex; flex-direction: column;
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 25px; border-bottom: 1px solid #eee; 
            background-color: #fff; border-radius: 20px 20px 0 0;
        }
        .modal-header h3 { margin: 0; color: var(--primary-color); font-size: 20px; }
        .close-modal { font-size: 28px; cursor: pointer; color: #bbb; transition: 0.2s; }
        .close-modal:hover { color: #555; }
        
        .logs-container { overflow-y: auto; flex: 1; padding: 20px; background-color: #f9f9fb; }
        
        /* Lecture Card Design */
        .lecture-card {
            background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #edf2f7;
            transition: 0.3s;
        }
        .lecture-card:hover { border-color: var(--primary-color); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .lecture-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .lecture-title-container { display: flex; align-items: center; gap: 12px; flex: 1; }
        .lecture-icon { 
            width: 45px; height: 45px; border-radius: 12px; 
            background: rgba(6, 70, 122, 0.1); color: var(--primary-color);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .lecture-info { display: flex; flex-direction: column; gap: 4px; }
        .lecture-name { font-weight: 700; color: #2d3748; font-size: 16px; }
        .lecture-open-count { font-size: 13px; color: var(--gray-text); font-weight: 500; }
        
        .lecture-stats { text-align: left; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .percentage-badge {
            background: var(--primary-color); color: white; padding: 4px 10px;
            border-radius: 20px; font-size: 13px; font-weight: bold;
        }
        .percentage-badge.high { background: var(--success-color); color: white; }
        .percentage-badge.legacy { background: #f39c12; color: white; }
        .progress-container { margin-top: 15px; }
        .progress-bar-bg { height: 8px; background: #edf2f7; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 10px; transition: width 0.5s ease; }
        .progress-bar-fill.high { background: var(--success-color); }
        .progress-labels { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; color: var(--gray-text); font-weight: 600; }
        
        /* Expand Arrow */
        .expand-arrow { transition: transform 0.3s; color: #cbd5e0; font-size: 20px; }
        .lecture-card.expanded .expand-arrow { transform: rotate(180deg); color: var(--primary-color); }

        /* Breakdown View */
        .breakdown-view { 
            display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0; 
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .timeline-container { margin-bottom: 20px; }
        .timeline-label { font-size: 13px; font-weight: 700; color: var(--primary-color); margin-bottom: 10px; display: block; }
        .timeline-bar { height: 12px; border-radius: 6px; overflow: hidden; display: flex; background: #eee; }
        .timeline-segment { height: 100%; }
        .segment-watched { background-color: var(--success-color); }
        .segment-unwatched { background-color: #e2e8f0; }

        .details-list { margin-top: 15px; }
        .detail-item { 
            display: flex; align-items: start; gap: 10px; margin-bottom: 8px; font-size: 13px; color: #4a5568; 
            background: #f8fafc; padding: 8px 12px; border-radius: 8px;
        }
        .detail-item i { margin-top: 3px; }
        .detail-item.watched { border-right: 3px solid var(--success-color); }
        .detail-item.unwatched { border-right: 3px solid #cbd5e0; }

        .opening-history { margin-top: 15px; }
        .opening-item { 
            font-size: 12px; color: #718096; display: flex; justify-content: space-between; 
            padding: 5px 0; border-bottom: 1px solid #f2f2f2;
        }
        .opening-item:last-child { border-bottom: none; }

        /* Navbar Selectors */
        .teacher-select-container, .month-select-container { 
            margin-right: 20px; padding-right: 20px; border-right: 2px solid #eee; 
            display: flex; align-items: center; gap: 10px;
        }
        #globalTeacherSelect, #globalMonthSelect { 
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--primary-color); 
            font-weight: bold; color: var(--primary-color); font-family: 'Tajawal'; cursor: pointer; 
            background: white;
        }
        
        .month-filter-container { display: none; } /* Hidden inside modal now */

        .status-msg { text-align: center; padding: 40px; color: #777; font-size: 16px; }
        #page-wrapper { display: none; }
    </style>
</head>
<body>

    <div id="page-wrapper">
        <div class="navbar no-print">
            <a href="activation_stats.html" class="nav-btn"><i class="fas fa-users"></i> الطلاب</a>
            <a href="view.html" class="nav-btn active"><i class="fas fa-eye"></i> المشاهدات</a>
            <a href="exam_degrees.html" class="nav-btn"><i class="fas fa-poll"></i> نتائج الامتحانات</a>
            <a href="Move_lec.html" class="nav-btn"><i class="fas fa-exchange-alt"></i> نقل المحاضرات</a>
            <a href="add_lec.html" class="nav-btn"><i class="fas fa-upload"></i> رفع محاضرات</a>

            <div class="teacher-select-container">
                <label style="font-size:12px; color:var(--primary-color); font-weight:bold;">المدرس:</label>
                <select id="globalTeacherSelect" onchange="changeGlobalTeacher(this.value)">
                </select>
            </div>

            <div class="month-select-container">
                <label style="font-size:12px; color:var(--primary-color); font-weight:bold;">الشهر:</label>
                <select id="globalMonthSelect" onchange="changeGlobalMonth(this.value)">
                    <option value="all">كل الشهور</option>
                </select>
            </div>
        </div>

        <div class="container">
            <header>
                <div id="welcome-msg">مرحباً...</div>
                <h2>سجل مشاهدات الطلاب - <span id="currentTeacherName"></span></h2>
                <button onclick="logout()" class="action-btn" style="background:#E74C3C; padding: 6px 15px; border:none; border-radius:5px; color:white; cursor:pointer;">خروج</button>
            </header>

            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="بحث باسم الطالب..." onkeyup="filterUsers()">
            </div>

            <div id="students-list">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th width="10%">#</th>
                            <th width="60%">اسم الطالب</th>
                            <th width="30%">المشاهدات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="3" class="status-msg">جاري تحميل الطلاب...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="viewsModal" class="modal">
        <div class="modal-content">
            <div id="modalHeaderContent">
                <div class="modal-header">
                    <h3 id="modalTitle">مشاهدات الطالب</h3>
                    <span class="close-modal" onclick="closeModal()">&times;</span>
                </div>
                <div id="monthFilterWrapper"></div>
            </div>
            <div id="modalBody" class="logs-container">
                <div class="status-msg">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: 'AIzaSyCdqYrVFspJ4rZwidfaPtc9PYpNlQQm09k',
            authDomain: 'amgg-81ac3.firebaseapp.com',
            databaseURL: 'https://amgg-81ac3-default-rtdb.firebaseio.com',
            projectId: 'amgg-81ac3',
            storageBucket: 'amgg-81ac3.firebasestorage.app',
            messagingSenderId: '284879336757',
            appId: '1:284879336757:web:1f42836c2382d11b73087c'
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allUsers = [];
        let studentAccessData = {}; // Global storage for access
        let activeTeacher = localStorage.getItem('selectedTeacher');
        let activeMonth = localStorage.getItem('selectedMonth') || 'all';

        // ================= Security Guard =================
        auth.onAuthStateChanged(async user => {
            if (user) {
                try {
                    const adminSnap = await db.ref(`admins/${user.uid}`).once('value');
                    const teacherSnap = await db.ref(`tea/${user.uid}`).once('value');

                    if (adminSnap.exists()) {
                        document.getElementById('welcome-msg').innerText = "مرحباً، المشرف العام";
                        setupTeacherSelector(null, true);
                    } else if (teacherSnap.exists()) {
                        const rawVal = teacherSnap.val();
                        const teachersList = rawVal.split('.').map(t => t.trim());
                        document.getElementById('welcome-msg').innerText = `مرحباً بك`;
                        setupTeacherSelector(teachersList, false);
                    } else {
                        alert('غير مصرح لك بالدخول');
                        auth.signOut();
                        window.location.href = 'index.html';
                        return;
                    }
                    document.getElementById('page-wrapper').style.display = 'block';
                } catch (e) {
                    console.error(e);
                    alert('خطأ في الاتصال بالقاعدة');
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function setupTeacherSelector(teachers, isAdmin) {
            const select = document.getElementById('globalTeacherSelect');
            select.innerHTML = '';
            
            if (isAdmin) {
                for(let i=1; i<=25; i++) {
                    const t = `مدرس ${i}`;
                    const opt = document.createElement('option');
                    opt.value = t; opt.textContent = t;
                    select.appendChild(opt);
                }
                if (!activeTeacher) activeTeacher = 'مدرس 1';
            } else {
                teachers.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t; opt.textContent = t;
                    select.appendChild(opt);
                });
                if (!activeTeacher || !teachers.includes(activeTeacher)) {
                    activeTeacher = teachers[0];
                }
            }
            
            select.value = activeTeacher;
            localStorage.setItem('selectedTeacher', activeTeacher);
            document.getElementById('currentTeacherName').innerText = activeTeacher;
            
            await fetchGlobalMonths();
            fetchUsers();
        }

        async function fetchGlobalMonths() {
            const select = document.getElementById('globalMonthSelect');
            select.innerHTML = '<option value="all">كل الشهور</option>';
            
            try {
                const snapshot = await db.ref(`months/${activeTeacher}`).once('value');
                const data = snapshot.val() || {};
                const months = Object.entries(data).map(([id, m]) => ({ id, name: m.name, order: m.order || 0 }));
                months.sort((a,b) => a.order - b.order);
                
                months.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id; opt.textContent = m.name;
                    select.appendChild(opt);
                });
                
                if (activeMonth && data[activeMonth]) {
                    select.value = activeMonth;
                } else {
                    activeMonth = 'all';
                    select.value = 'all';
                }
                localStorage.setItem('selectedMonth', activeMonth);
            } catch (e) { console.error(e); }
        }

        window.changeGlobalTeacher = function(val) {
            activeTeacher = val;
            localStorage.setItem('selectedTeacher', val);
            document.getElementById('currentTeacherName').innerText = activeTeacher;
            fetchGlobalMonths().then(() => fetchUsers());
        }

        window.changeGlobalMonth = function(val) {
            activeMonth = val;
            localStorage.setItem('selectedMonth', val);
            renderUsers(allUsers); // Re-render table with new selection
        }

        // ================= Fetch Users =================
        async function fetchUsers() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" class="status-msg">جاري تحميل البيانات...</td></tr>';
            try {
                const [usersSnap, accessSnap] = await Promise.all([
                    db.ref('users').once('value'),
                    db.ref('student_month_access').once('value')
                ]);

                const data = usersSnap.val() || {};
                studentAccessData = accessSnap.val() || {};
                
                allUsers = [];
                for (const [uid, userData] of Object.entries(data)) {
                    if (userData.year !== activeTeacher) continue;

                    allUsers.push({
                        uid: uid,
                        name: userData.fullName || 'بدون اسم'
                    });
                }
                
                renderUsers(allUsers);

            } catch (error) {
                console.error(error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" class="status-msg" style="color:red">خطأ: ${error.message}</td></tr>`;
            }
        }

        function renderUsers(usersList) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            // Filter by active month if not 'all'
            let filteredList = usersList;
            if (activeMonth !== 'all') {
                filteredList = usersList.filter(user => {
                    const access = studentAccessData[user.uid];
                    return access && access[activeMonth];
                });
            }

            if (filteredList.length === 0) {
                const msg = activeMonth === 'all' 
                    ? `لا يوجد طلاب للمدرس ${activeTeacher}`
                    : `لا يوجد طلاب مفعل لهم هذا الشهر حالياً.`;
                tbody.innerHTML = `<tr><td colspan="3" class="status-msg">${msg}</td></tr>`;
                return;
            }

            let count = 0;
            filteredList.forEach(user => {
                count++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${count}</td>
                    <td style="font-size:16px;"><strong>${user.name}</strong></td>
                    <td>
                        <button class="view-btn" onclick="openLogsModal('${user.uid}', '${user.name}')">
                            <i class="fas fa-eye"></i> عرض التفاصيل
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterUsers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(term));
            renderUsers(filtered);
        }

        // ================= Modal Logic (Enhanced Progress with Month Filter) =================
        const modal = document.getElementById('viewsModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        
        let currentStudentReport = []; // Store fetched report to filter locally
        let currentStudentUID = "";

        async function openLogsModal(uid, studentName) {
            currentStudentUID = uid;
            modal.style.display = 'flex';
            modalTitle.innerText = `مشاهدات: ${studentName}`;
            modalBody.innerHTML = '<div class="status-msg"><i class="fas fa-spinner fa-spin"></i> جاري استخراج تقارير المشاهدة...</div>';

            try {
                // Fetch Logs, Progress, and Lectures in parallel (Months already fetched globally)
                const [logsSnap, progressSnap, lecturesSnap] = await Promise.all([
                    db.ref(`lecture_access_logs/${uid}`).once('value'),
                    db.ref(`users/${uid}/watch_progress/${activeTeacher}`).once('value'),
                    db.ref(`lectures/${activeTeacher}`).once('value')
                ]);

                const logsData = logsSnap.val() || {};
                const progressData = progressSnap.val() || {};
                const lecturesTree = lecturesSnap.val() || {};

                // Create final report structure based on actual lectures
                currentStudentReport = [];
                
                for (const [monthId, lectures] of Object.entries(lecturesTree)) {
                    if (typeof lectures !== 'object') continue;
                    for (const [lectureId, lecInfo] of Object.entries(lectures)) {
                        const title = lecInfo.title || 'بدون عنوان';
                        const lecReport = {
                            id: lectureId,
                            monthId: monthId,
                            title: title,
                            number: lecInfo.lectureNumber || '',
                            openCount: 0,
                            openings: [],
                            progress: 0,
                            watched: 0,
                            total: 0,
                            segments: []
                        };

                        // Match logs by title
                        for (const log of Object.values(logsData)) {
                            if (log.lectureTitle === title && log.yearKey === activeTeacher) {
                                lecReport.openCount++;
                                lecReport.openings.push(log.timestamp);
                            }
                        }

                        // Match progress by month and ID
                        const p = progressData[monthId] ? progressData[monthId][lectureId] : null;
                        if (p) {
                            lecReport.progress = p.progress || 0;
                            lecReport.watched = p.watched || 0;
                            lecReport.total = p.total || 0;
                            lecReport.segments = p.watched_segments || [];
                        }

                        if (lecReport.openCount > 0 || lecReport.progress > 0) {
                            currentStudentReport.push(lecReport);
                        }
                    }
                }

                // Initial render: respect the global activeMonth
                renderFilteredReport(activeMonth);

            } catch (error) {
                console.error(error);
                modalBody.innerHTML = `<div class="status-msg" style="color:red">حدث خطأ في تحميل البيانات: ${error.message}</div>`;
            }
        }

        function renderMonthFilter(monthsList) {
            const wrapper = document.getElementById('monthFilterWrapper');
            if (monthsList.length === 0) return;

            let options = '<option value="all">كل الشهور</option>';
            monthsList.forEach(m => {
                options += `<option value="${m.id}">${m.name}</option>`;
            });

            wrapper.innerHTML = `
                <div class="month-filter-container">
                    <label><i class="fas fa-filter"></i> تصفية بالشهر:</label>
                    <select class="month-select" onchange="renderFilteredReport(this.value)">
                        ${options}
                    </select>
                </div>
            `;
        }

        window.renderFilteredReport = function(monthId) {
            const filtered = monthId === 'all' 
                ? currentStudentReport 
                : currentStudentReport.filter(lec => lec.monthId === monthId);

            if (filtered.length === 0) {
                modalBody.innerHTML = '<div class="status-msg">لا توجد سجلات مشاهدة في هذا الشهر.</div>';
                return;
            }

            // Sort: Most recently opened first
            filtered.sort((a, b) => {
                const lastA = a.openings.length > 0 ? Math.max(...a.openings) : 0;
                const lastB = b.openings.length > 0 ? Math.max(...b.openings) : 0;
                return lastB - lastA;
            });

            let html = '';
            filtered.forEach((lec, index) => {
                const percentage = Math.round(lec.progress * 100);
                const isHigh = percentage >= 90;
                
                // Check if it was watched before the update (logs exist but progress is 0)
                const isLegacy = percentage === 0 && lec.openCount > 0;
                
                html += `
                    <div class="lecture-card" id="lec-${index}">
                        <div class="lecture-header" onclick="toggleLectureDetails(${index})">
                            <div class="lecture-title-container">
                                <div class="lecture-icon">
                                    <i class="fas ${lec.progress > 0.9 ? 'fa-check-double' : 'fa-play-circle'}"></i>
                                </div>
                                <div class="lecture-info">
                                    <span class="lecture-name">${lec.number ? lec.number + ' - ' : ''}${lec.title}</span>
                                    <span class="lecture-open-count">فُتحت ${lec.openCount} مرات</span>
                                </div>
                            </div>
                            <div class="lecture-stats">
                                <span class="percentage-badge ${isHigh ? 'high' : ''} ${isLegacy ? 'legacy' : ''}">
                                    ${percentage}% ${isLegacy ? '<small style="font-size:9px; display:block; opacity:0.8;">قبل التحديث</small>' : ''}
                                </span>
                                <i class="fas fa-chevron-down expand-arrow"></i>
                            </div>
                        </div>
                        
                        <div class="progress-container">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill ${isHigh ? 'high' : ''}" style="width: ${percentage}%"></div>
                            </div>
                            <div class="progress-labels">
                                <span>${formatSeconds(lec.watched)} / ${formatSeconds(lec.total)}</span>
                                <span>${percentage}% اكتمل</span>
                            </div>
                        </div>

                        <div class="breakdown-view" id="details-${index}">
                            ${lec.segments && lec.segments.length > 0 ? `
                                <div class="timeline-container">
                                    <span class="timeline-label">تفاصيل المشاهدة 📊</span>
                                    <div class="timeline-bar">
                                        ${renderTimeline(lec.segments, lec.total)}
                                    </div>
                                </div>
                                <div class="details-list">
                                    ${renderSegmentsText(lec.segments, lec.total)}
                                </div>
                            ` : '<div class="status-msg" style="padding:10px; font-size:12px;">لا توجد تفاصيل دقيقة للمشاهدة بعد.</div>'}
                            
                            <div class="opening-history">
                                <span class="timeline-label">سجل الفتح 📅</span>
                                ${lec.openings.sort((a,b) => b-a).slice(0, 5).map(ts => {
                                    const d = new Date(ts);
                                    return `
                                        <div class="opening-item">
                                            <span><i class="far fa-clock"></i> ${d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                                            <span>${d.toLocaleDateString('ar-EG')}</span>
                                        </div>
                                    `;
                                }).join('')}
                                ${lec.openings.length > 5 ? `<div style="text-align:center; font-size:11px; color:#aaa; margin-top:5px;">+ ${lec.openings.length - 5} مرات أخرى</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            modalBody.innerHTML = html;
        }

        // --- Helper Functions ---

        window.toggleLectureDetails = function(index) {
            const card = document.getElementById(`lec-${index}`);
            const details = document.getElementById(`details-${index}`);
            const isExpanded = card.classList.contains('expanded');
            
            if (isExpanded) {
                card.classList.remove('expanded');
                details.style.display = 'none';
            } else {
                card.classList.add('expanded');
                details.style.display = 'block';
            }
        }

        function formatSeconds(seconds) {
            if (!seconds) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const mStr = m.toString().padStart(2, '0');
            const sStr = s.toString().padStart(2, '0');
            return h > 0 ? `${h}:${mStr}:${sStr}` : `${mStr}:${sStr}`;
        }

        function renderTimeline(watched, total) {
            if (!total || !watched || watched.length === 0) return '';
            const blocks = calculateBlocks(watched, total);
            return blocks.map(b => {
                const width = ((b.end - b.start) / total) * 100;
                return `<div class="timeline-segment ${b.isWatched ? 'segment-watched' : 'segment-unwatched'}" style="width: ${width}%"></div>`;
            }).join('');
        }

        function renderSegmentsText(watched, total) {
            const blocks = calculateBlocks(watched, total);
            return blocks.filter(b => b.isWatched && (b.end - b.start) > 2).map(b => `
                <div class="detail-item watched">
                    <i class="fas fa-check-circle" style="color:var(--success-color)"></i>
                    <span>تم شاهدة المقطع من <b>${formatSeconds(b.start)}</b> إلى <b>${formatSeconds(b.end)}</b></span>
                </div>
            `).join('');
        }

        function calculateBlocks(watched, total) {
            if (!total) return [];
            let sorted = [...new Set(watched)].sort((a, b) => a - b);
            if (sorted.length === 0) return [{start: 0, end: total, isWatched: false}];

            let blocks = [];
            let currentStart = sorted[0];
            let currentEnd = currentStart;

            if (currentStart > 0) blocks.push({start: 0, end: currentStart, isWatched: false});

            for (let i = 1; i < sorted.length; i++) {
                if (sorted[i] <= currentEnd + 5) {
                    currentEnd = sorted[i];
                } else {
                    blocks.push({start: currentStart, end: currentEnd, isWatched: true});
                    blocks.push({start: currentEnd, end: sorted[i], isWatched: false});
                    currentStart = sorted[i];
                    currentEnd = currentStart;
                }
            }
            blocks.push({start: currentStart, end: currentEnd, isWatched: true});
            if (currentEnd < total) blocks.push({start: currentEnd, end: total, isWatched: false});
            
            return blocks;
        }


        function closeModal() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        function logout() {
            localStorage.removeItem('selectedTeacher');
            auth.signOut().then(() => window.location.href = 'index.html');
        }
    </script>
</body>
</html>
