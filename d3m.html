<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم AMG - WhatsApp Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #06467A; --bg: #dadbd3; --student-msg: #ffffff; --admin-msg: #dcf8c6; --delete: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #admin-panel { display: none; width: 100%; height: 100vh; background: #fff; flex-direction: row-reverse; position: relative; }
        .sidebar { width: 30%; min-width: 320px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; height: 100%; }
        .sidebar-header { padding: 15px; background: #f0f2f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #server-selector-container { padding: 12px; background: var(--primary); color: #fff; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; outline: none;}

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(20px); }

        .chat-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .chat-item { display: flex; align-items: center; padding: 15px; cursor: pointer; border-bottom: 1px solid #f8f9fa; transition: background 0.2s;}
        .chat-item:hover { background: #f5f6f6; }
        .chat-item.active-chat { background: #ebebeb; } 
        
        .avatar { width: 48px; height: 48px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 15px; font-weight: bold; flex-shrink: 0;}
        .unread-badge { background-color: #e74c3c; color: white; font-size: 12px; font-weight: bold; min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; padding: 0 6px; margin-right: 10px; }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; border-left: 1px solid #ddd; height: 100%; }
        .chat-header { padding: 12px 20px; background: #f0f2f5; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        
        #messages-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .message-wrapper { display: flex; align-items: center; margin-bottom: 10px; width: 100%; }
        .message { max-width: 65%; padding: 10px 15px; border-radius: 12px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.5; transition: opacity 0.2s ease-in-out; }
        .msg-student { align-self: flex-start; background: #ffffff; border-top-right-radius: 2px; text-align: right; }
        .msg-admin { align-self: flex-end; background: #dcf8c6; border-top-left-radius: 2px; text-align: right; }
        .delete-btn-icon { color: var(--delete); cursor: pointer; margin: 0 12px; opacity: 0.1; transition: 0.2s; font-size: 15px; }
        .message-wrapper:hover .delete-btn-icon { opacity: 1; }
        .msg-time { font-size: 10px; color: #888; margin-top: 5px; text-align: left; direction: ltr; display: inline-block; float: left; }
        .msg-img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        .input-area { padding: 10px 15px; background: #f0f2f5; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .send-btn { background: var(--primary); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; flex-shrink: 0;}
        .back-btn { display: none; margin-left: 15px; font-size: 20px; cursor: pointer; color: #54656f; padding: 5px; }

        @media (max-width: 768px) {
            #admin-panel { display: block; }
            .sidebar { width: 100%; position: absolute; z-index: 10; top: 0; right: 0; transition: transform 0.3s ease-in-out; }
            .sidebar.hidden { transform: translateX(100%); } 
            .main-chat { width: 100%; position: absolute; top: 0; right: 0; z-index: 5; }
            .back-btn { display: block; } 
            #messages-container { padding: 15px; }
            .message { max-width: 85%; }
            .delete-btn-icon { opacity: 1; font-size: 18px; } 
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        
        <div class="sidebar" id="sidebar">
            <div id="server-selector-container">
                <select id="server-select" onchange="filterChatsByServer()"></select>
            </div>
            <div class="sidebar-header">
                <span>المحادثات</span>
            </div>
            
            <div id="bot-ui-container" style="display: none; padding: 12px 15px; background: #eaf4fa; border-bottom: 1px solid #ddd; justify-content: space-between; align-items: center;">
                <div>
                    <i class="fas fa-robot" style="color: var(--primary); font-size: 18px;"></i>
                    <span style="font-weight: 600; margin-right: 8px;">مساعد الرياضيات (AI)</span>
                    <div id="bot-status-text" style="font-size: 12px; color: #e74c3c; margin-top: 4px;">متوقف 🔴</div>
                </div>
                <label class="switch">
                  <input type="checkbox" id="botToggle" onchange="toggleBot(this.checked)">
                  <span class="slider round"></span>
                </label>
            </div>

            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header" id="chat-header" style="display: none;">
                <i class="fas fa-arrow-right back-btn" onclick="toggleSidebar(true)" title="رجوع للقائمة"></i>
                <div class="avatar" id="active-avatar">?</div>
                <div style="margin-right: 15px; flex: 1;">
                    <div id="active-name" style="font-weight: bold; color: #111;"></div>
                    <div id="active-phone" style="font-size: 12px; color: #27ae60; font-weight: bold;"></div>
                </div>
                <i class="fas fa-trash-alt" style="color:var(--delete); cursor:pointer; font-size: 18px; padding: 5px;" onclick="deleteFullChat()" title="مسح الشات بالكامل"></i>
            </div>

            <div id="messages-container">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #777; text-align: center;">
                    <i class="fab fa-whatsapp" style="font-size: 80px; color: #ccc; margin-bottom: 20px;"></i>
                    <h2>AMG Web Support</h2>
                    <p>اختر طالباً من القائمة للبدء</p>
                </div>
            </div>

            <div class="input-area" id="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="اكتب ردك هنا...">
                <button class="send-btn" onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: 'AIzaSyCdqYrVFspJ4rZwidfaPtc9PYpNlQQm09k',
            appId: '1:284879336757:web:1f42836c2382d11b73087c',
            messagingSenderId: '284879336757',
            projectId: 'amgg-81ac3',
            authDomain: 'amgg-81ac3.firebaseapp.com',
            databaseURL: 'https://amgg-81ac3-default-rtdb.firebaseio.com',
            storageBucket: 'amgg-81ac3.firebasestorage.app',
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let DEEPSEEK_API_KEY = "";
        const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';
        
        let isBotActive = false;
        let botActivationTime = 0; 
        let processingMessages = new Set(); 

        // 🌟 استدعاء أو إنشاء الكاش من المتصفح (لتوفير التوكنز والسرعة)
        let aiCache = JSON.parse(localStorage.getItem('amg_bot_cache')) || {};

        let selectedServer = "";
        let currentChatPath = "";
        let currentStudentName = "";
        let chatListenerRef = null;
        let permissionListenerRef = null;
        let currentExpireInterval = null; 

        db.ref('settings/deepseek_api_key').on('value', snap => {
            DEEPSEEK_API_KEY = snap.val() || "";
        });

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'index.html';
            else checkPermissions(user.uid);
        });

        async function checkPermissions(uid) {
            const adminSnap = await db.ref(`admins/${uid}`).get();
            if (adminSnap.exists()) {
                loadServers();
                document.getElementById('admin-panel').style.display = 'flex';
            } else {
                const teaSnap = await db.ref(`tea/${uid}`).get();
                if (teaSnap.exists()) {
                    initPanel(teaSnap.val().split('.'));
                    document.getElementById('admin-panel').style.display = 'flex';
                } else { 
                    auth.signOut().then(() => window.location.href = 'index.html');
                }
            }
        }

        function loadServers() {
            db.ref('support_chats').once('value', snap => {
                initPanel(Object.keys(snap.val() || {}));
            });
        }

        function initPanel(servers) {
            const select = document.getElementById('server-select');
            select.innerHTML = servers.map(s => `<option value="${s}">${s}</option>`).join('');
            if (!selectedServer || !servers.includes(selectedServer)) { 
                selectedServer = servers[0]; 
            }
            select.value = selectedServer;
            filterChatsByServer(); 
        }

        function filterChatsByServer() {
            selectedServer = document.getElementById('server-select').value;
            currentChatPath = "";
            currentStudentName = "";
            
            if (chatListenerRef) { chatListenerRef.off(); chatListenerRef = null; }
            document.getElementById('chat-header').style.display = 'none';
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('messages-container').innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #777; text-align: center;">
                    <i class="fab fa-whatsapp" style="font-size: 80px; color: #ccc; margin-bottom: 20px;"></i>
                    <h2>AMG Web Support</h2>
                    <p>اختر طالباً من القائمة للبدء</p>
                </div>`;
            document.getElementById('chat-list').innerHTML = '<div style="text-align:center; padding:20px; color:#888;">جاري التحميل...</div>';
            
            fetchChats();
            checkBotPermission(); 
        }

        function checkBotPermission() {
            if(permissionListenerRef) permissionListenerRef.off();
            if(currentExpireInterval) clearInterval(currentExpireInterval); 
            
            permissionListenerRef = db.ref(`settings/bot_access/${selectedServer}`);
            permissionListenerRef.on('value', snap => {
                const data = snap.val();
                let hasPermission = false;
                
                if (currentExpireInterval) clearInterval(currentExpireInterval);

                if (typeof data === 'boolean') {
                    hasPermission = data;
                } else if (data && data.active === true) {
                    if (data.expireAt) {
                        if (Date.now() < data.expireAt) {
                            hasPermission = true;
                            currentExpireInterval = setInterval(() => {
                                if (Date.now() >= data.expireAt) {
                                    clearInterval(currentExpireInterval);
                                    db.ref(`settings/bot_access/${selectedServer}`).set({active: false, expireAt: null});
                                }
                            }, 1000);
                        } else {
                            hasPermission = false;
                            db.ref(`settings/bot_access/${selectedServer}`).set({active: false, expireAt: null});
                        }
                    } else {
                        hasPermission = true; 
                    }
                }

                const botUI = document.getElementById('bot-ui-container');
                if(hasPermission) {
                    botUI.style.display = 'flex';
                } else {
                    botUI.style.display = 'none';
                    if(isBotActive) {
                        document.getElementById('botToggle').checked = false;
                        toggleBot(false);
                    }
                }
            });
        }

        function toggleBot(state) {
            isBotActive = state;
            const statusText = document.getElementById('bot-status-text');
            if(state) {
                if(!DEEPSEEK_API_KEY) {
                    alert("لم يتم إعداد مفتاح API الخاص بـ DeepSeek في لوحة الإدارة بعد!");
                    document.getElementById('botToggle').checked = false;
                    isBotActive = false;
                    return;
                }
                botActivationTime = Date.now(); 
                processingMessages.clear(); 
                statusText.innerText = "يعمل الآن 🟢";
                statusText.style.color = "#27ae60";
                filterChatsByServer(); 
            } else {
                botActivationTime = 0;
                statusText.innerText = "متوقف 🔴";
                statusText.style.color = "#e74c3c";
            }
        }

        async function askDeepSeek(chatHistoryForApi, server, studentName, msgKey) {
            db.ref(`support_chats/${server}/${studentName}/${msgKey}/botReplied`).set('pending');

            try {
                const apiMessages = [
                    { 
                        role: "system", 
                        content: "أنت مساعد ذكي وودود لمدرس رياضيات في منصة AMG التعليمية. \n" +
                                 "قواعد هامة جداً:\n" +
                                 "1. اقرأ الرسائل السابقة لتفهم سياق المحادثة.\n" +
                                 "2. أجب حصراً على 'الرسالة الأخيرة' التي أرسلها المستخدم بناءً على السياق.\n" +
                                 "3. تحدث بطبيعية. وإذا سألك الطالب (عامل إيه، كيف حالك)، رد بلطف مثل: 'أنا بخير والحمد لله! كيف أساعدك في الرياضيات؟'\n" +
                                 "4. أجب على أسئلة الرياضيات بدقة وفي رسالة واحدة قصيرة فقط.\n" +
                                 "5. إذا سألك عن تخصص آخر غير الرياضيات اعتذر بلطف وأخبره أنك مخصص للرياضيات فقط.\n" +
                                 "6. لا تقم بتجزئة إجابتك، أرسل الرد كاملاً في فقرة واحدة."
                    },
                    ...chatHistoryForApi 
                ];

                // 🌟 إنشاء مفتاح كاش مميز بناءً على الرسائل للتحقق منه
                const cacheKey = JSON.stringify(apiMessages);

                // 🌟 التحقق من الذاكرة (الكاش) قبل إرسال الطلب لـ DeepSeek
                if (aiCache[cacheKey]) {
                    console.log("⚡ تم جلب الرد من الذاكرة (بدون استهلاك توكنز)");
                    const cachedReply = aiCache[cacheKey];

                    await db.ref(`support_chats/${server}/${studentName}`).push().set({
                        senderId: "BOT_ADMIN",
                        senderName: "مساعد الرياضيات",
                        text: cachedReply,
                        timestamp: Date.now(),
                        isFromAdmin: true,
                        isRead: true 
                    });

                    db.ref(`support_chats/${server}/${studentName}/${msgKey}/botReplied`).set(true);
                    return; // إنهاء الدالة فوراً بنجاح
                }

                // 🌟 لو لم يكن في الذاكرة، يتم طلب API
                const response = await fetch(DEEPSEEK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: apiMessages,
                        temperature: 0.4, 
                        max_tokens: 300 
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const replyText = data.choices[0].message.content;

                    // 🌟 حفظ الرد في الكاش المحلي للمرات القادمة
                    aiCache[cacheKey] = replyText;
                    localStorage.setItem('amg_bot_cache', JSON.stringify(aiCache));

                    await db.ref(`support_chats/${server}/${studentName}`).push().set({
                        senderId: "BOT_ADMIN",
                        senderName: "مساعد الرياضيات",
                        text: replyText,
                        timestamp: Date.now(),
                        isFromAdmin: true,
                        isRead: true 
                    });

                    db.ref(`support_chats/${server}/${studentName}/${msgKey}/botReplied`).set(true);
                }
            } catch (error) {
                console.error("DeepSeek API Error:", error);
                processingMessages.delete(msgKey);
            }
        }

        let serverChatsListenerRef = null;
        function fetchChats() {
            if (!selectedServer) return;
            
            if (serverChatsListenerRef) { serverChatsListenerRef.off(); }

            serverChatsListenerRef = db.ref(`support_chats/${selectedServer}`);
            serverChatsListenerRef.on('value', snap => {
                const listDiv = document.getElementById('chat-list');
                listDiv.innerHTML = '';
                const students = snap.val();
                
                if (students) {
                    let studentArray = [];
                    
                    for (let name in students) {
                        const msgs = students[name];
                        let unreadCount = 0;
                        let lastTimestamp = 0;
                        let chatHistory = []; 

                        if (msgs) {
                            const msgList = Object.keys(msgs).map(key => {
                                let m = msgs[key];
                                m.key = key;
                                return m;
                            }).sort((a, b) => a.timestamp - b.timestamp);

                            msgList.forEach(m => {
                                if (m.timestamp > lastTimestamp) lastTimestamp = m.timestamp;
                                if (m.isFromAdmin === false && m.isRead === false) unreadCount++;
                                if (m.text) {
                                    chatHistory.push({ role: m.isFromAdmin ? "assistant" : "user", content: m.text });
                                }
                            });

                            const lastMsg = msgList[msgList.length - 1];
                            let recentHistoryForApi = chatHistory.slice(-10);

                            if (isBotActive && lastMsg && lastMsg.isFromAdmin === false && !lastMsg.botReplied && lastMsg.text && lastMsg.timestamp >= botActivationTime) {
                                if (!processingMessages.has(lastMsg.key)) {
                                    processingMessages.add(lastMsg.key); 
                                    db.ref(`support_chats/${selectedServer}/${name}/${lastMsg.key}/botReplied`).set('processing');
                                    askDeepSeek(recentHistoryForApi, selectedServer, name, lastMsg.key);
                                }
                            }
                        }
                        studentArray.push({ name, unreadCount, lastTimestamp });
                    }
                    
                    studentArray.sort((a, b) => b.lastTimestamp - a.lastTimestamp);

                    studentArray.forEach(studentObj => {
                        const name = studentObj.name;
                        const unread = studentObj.unreadCount;
                        
                        const item = document.createElement('div');
                        item.className = 'chat-item';
                        if (`support_chats/${selectedServer}/${name}` === currentChatPath) item.classList.add('active-chat');

                        item.onclick = () => openChat(selectedServer, name);
                        
                        let badgeHtml = unread > 0 ? `<div class="unread-badge">${unread}</div>` : '';

                        item.innerHTML = `
                            <div class="avatar">${name[0]}</div>
                            <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                                <b style="color:#111; line-height:1.2;">${name}</b>
                                <div style="font-size:12px;color:#667781; line-height:1.2;">${selectedServer}</div>
                            </div>
                            ${badgeHtml}
                        `;
                        listDiv.appendChild(item);
                    });
                } else {
                    listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">لا توجد محادثات هنا حالياً.</div>';
                }
            });
        }

        function formatTime12Hour(timestamp) {
            const date = new Date(timestamp);
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function openChat(server, student) {
            if (chatListenerRef) chatListenerRef.off();

            currentChatPath = `support_chats/${server}/${student}`;
            currentStudentName = student;
            
            const allItems = document.querySelectorAll('.chat-item');
            allItems.forEach(item => item.classList.remove('active-chat'));
            
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('active-name').innerText = student;
            document.getElementById('active-avatar').innerText = student[0];
            
            db.ref('users').orderByChild('fullName').equalTo(student).once('value', snap => {
                if (snap.exists()) {
                    const u = Object.values(snap.val())[0];
                    document.getElementById('active-phone').innerText = u.phoneNumber || "";
                }
            });

            toggleSidebar(false);

            chatListenerRef = db.ref(currentChatPath).orderByChild('timestamp');
            chatListenerRef.on('value', snap => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                const msgs = snap.val();
                
                if (msgs) {
                    let updates = {}; 

                    Object.keys(msgs).forEach(key => {
                        const m = msgs[key];
                        
                        if (m.isFromAdmin === false && m.isRead === false) {
                            updates[`${key}/isRead`] = true;
                        }

                        const wrapper = document.createElement('div');
                        wrapper.className = "message-wrapper";
                        wrapper.style.flexDirection = m.isFromAdmin ? "row-reverse" : "row";

                        let formattedText = m.text ? m.text.replace(/\n/g, '<br>') : '';

                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${m.isFromAdmin ? 'msg-admin' : 'msg-student'}`;
                        let content = formattedText ? `<div style="margin-bottom: 4px;">${formattedText}</div>` : '';
                        if (m.imageUrl) content += `<img src="${m.imageUrl}" class="msg-img" onclick="window.open('${m.imageUrl}')">`;
                        
                        const formattedTime = formatTime12Hour(m.timestamp);
                        msgDiv.innerHTML = `${content}<div class="msg-time">${formattedTime}</div><div style="clear:both;"></div>`;

                        const delBtn = document.createElement('i');
                        delBtn.className = "fas fa-trash-alt delete-btn-icon";
                        delBtn.onclick = (e) => { e.stopPropagation(); deleteMessage(key); };

                        wrapper.appendChild(msgDiv);
                        wrapper.appendChild(delBtn);
                        container.appendChild(wrapper);
                    });

                    container.scrollTop = container.scrollHeight;

                    if (Object.keys(updates).length > 0) {
                        db.ref(currentChatPath).update(updates);
                    }
                }
            });
        }

        async function deleteMessage(msgId) {
            if (confirm("هل أنت متأكد من حذف هذه الرسالة نهائياً؟")) {
                const snap = await db.ref(`${currentChatPath}/${msgId}`).get();
                if (snap.exists() && snap.val().imageStoragePath) {
                    try { await storage.ref(snap.val().imageStoragePath).delete(); } catch(e) {}
                }
                db.ref(`${currentChatPath}/${msgId}`).remove();
            }
        }

        async function deleteFullChat() {
            if (confirm(`هل أنت متأكد من مسح المحادثة بالكامل مع ${currentStudentName}؟`)) {
                const snap = await db.ref(currentChatPath).get();
                if (snap.exists()) {
                    const msgs = snap.val();
                    for (let key in msgs) {
                        if (msgs[key].imageStoragePath) {
                            try { await storage.ref(msgs[key].imageStoragePath).delete(); } catch(e) {}
                        }
                    }
                }
                db.ref(currentChatPath).remove();
                document.getElementById('messages-container').innerHTML = '';
                document.getElementById('chat-header').style.display = 'none';
                document.getElementById('input-area').style.display = 'none';
                
                if (chatListenerRef) { chatListenerRef.off(); chatListenerRef = null; }
                currentChatPath = "";
                
                toggleSidebar(true);
            }
        }

        function sendReply() {
            const input = document.getElementById('message-input');
            if (!input.value.trim() || !currentChatPath) return;
            db.ref(currentChatPath).push().set({
                senderId: "ADMIN",
                text: input.value.trim(),
                timestamp: Date.now(),
                isFromAdmin: true,
                isRead: true 
            });
            input.value = '';
            input.focus();
        }

        document.getElementById('message-input').addEventListener('keypress', e => { if(e.key==='Enter') sendReply(); });

        function toggleSidebar(show) {
            const sb = document.getElementById('sidebar');
            if (show) {
                sb.classList.remove('hidden'); 
            } else {
                sb.classList.add('hidden'); 
            }
        }
    </script>
</body>
</html>
