<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء امتحان جديد | AMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary-color: #6C5CE7; --secondary-color: #A29BFE; --light-color: #F5F6FA; --dark-color: #2D3436; --success-color: #00CE9F; --danger-color: #E74C3C; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--light-color); margin: 0; padding: 0; color: var(--dark-color); }
        
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 40px 20px; }
        
        header {
            background-color: var(--primary-color); color: white; padding: 20px;
            border-radius: 15px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: 'Tajawal'; }
        
        .question-card { border-right: 4px solid var(--secondary-color); position: relative; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .question-title { font-weight: bold; color: var(--primary-color); }
        .delete-q-btn { background: #ffebeb; color: var(--danger-color); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: 'Tajawal'; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .option-item { display: flex; align-items: center; gap: 5px; background: #f9f9f9; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
        .option-item input[type="text"] { border: none; background: transparent; width: 100%; outline: none; font-family: 'Tajawal'; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%; font-family: 'Tajawal'; }
        .btn-add { background-color: var(--secondary-color); color: white; margin-bottom: 10px; }
        .btn-add:hover { background-color: #8c80f7; }
        .btn-import { background-color: #0984e3; color: white; margin-bottom: 10px; }
        .btn-import:hover { background-color: #0b72c2; }
        .btn-cancel { background-color: var(--danger-color); color: white; }
        .btn-cancel:hover { background-color: #c0392b; }
        .btn-save { background-color: var(--success-color); color: white; }
        .btn-save:hover { background-color: #00b38b; }
        .btn-disabled { background-color: #ccc !important; cursor: not-allowed; }

        .preview-img { max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px; display: none; max-height: 200px; object-fit: contain; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .back-btn-top {
            display: inline-block; background: var(--primary-color); color: white;
            padding: 8px 16px; border-radius: 6px; text-decoration: none;
            font-weight: bold; margin-bottom: 15px; font-size: 14px;
        }

        /* تصميم نافذة استيراد الأسئلة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 700px;
            height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .modal-header h2 { margin: 0; color: var(--primary-color); font-size: 22px; }
        .modal-body {
            overflow-y: auto; flex: 1; border: 1px solid #eee; padding: 10px; border-radius: 8px;
            background: #fafafa;
        }
        .modal-footer {
            margin-top: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-top: 1px solid #eee; padding-top: 15px;
        }
        .q-list-item {
            display: flex; align-items: flex-start; gap: 15px; padding: 12px; border-bottom: 1px solid #ddd;
            background: white; margin-bottom: 5px; border-radius: 6px; transition: 0.2s; cursor: pointer;
        }
        .q-list-item:hover { background: #f1f1f1; }
        .q-list-item input[type="checkbox"] { margin-top: 5px; transform: scale(1.4); cursor: pointer; }
        .q-list-details { flex: 1; pointer-events: none; }
        .q-list-title { font-weight: bold; margin-bottom: 8px; color: var(--dark-color); display: block; }
        .q-list-choices { font-size: 14px; color: #555; display: flex; gap: 10px; flex-wrap: wrap;}
        .q-choice-badge { background: #eee; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; }
        .correct-badge { background: #d4edda; border-color: #c3e6cb; color: #155724; font-weight: bold; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 10px; font-weight: bold;" id="loadingText">جاري الحفظ...</p>
    </div>

    <div style="width: 100%; max-width: 800px; margin: 0 auto; padding-top: 20px;">
        <a href="#" class="back-btn-top"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <div class="container">
        <header>
            <h1>إنشاء امتحان جديد</h1>
        </header>

        <div class="card">
            <h3>بيانات الامتحان</h3>
            <div class="form-group">
                <label>عنوان الامتحان</label>
                <input type="text" id="examTitle" class="form-control" placeholder="مثال: امتحان شامل شهر أكتوبر">
            </div>
            <div class="form-group">
                <label>مدة الامتحان (بالدقائق)</label>
                <input type="number" id="examDuration" class="form-control" placeholder="30" value="30">
            </div>
            <div class="form-group">
                <label>السنة الدراسية (المدرس)</label>
                <select id="yearSelect" class="form-control">
                    <option value="" disabled selected>-- انتظر تهيئة النظام... --</option>
                </select>
            </div>
            <div class="form-group">
                <label>الشهر الدراسي</label>
                <select id="monthSelect" class="form-control" disabled>
                    <option value="" disabled selected>-- اختر السنة أولاً --</option>
                </select>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-add" onclick="addQuestionUI()">
                <i class="fas fa-plus"></i> إضافة سؤال يدوي
            </button>
            <input type="file" id="jsonFileInput" accept=".json" style="display:none;" onchange="handleJsonFile(event)">
            <button class="btn btn-import" onclick="document.getElementById('jsonFileInput').click()">
                <i class="fas fa-file-import"></i> اختيار أسئلة من ملف
            </button>
        </div>

        <button id="saveBtn" class="btn btn-save btn-disabled" onclick="saveExam()" disabled>
            <i class="fas fa-save"></i> حفظ الامتحان (يرجى الانتظار...)
        </button>
    </div>

    <div class="modal-overlay" id="qModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>اختيار الأسئلة من الملف</h2>
                <button style="border:none; background:none; font-size:24px; cursor:pointer; color: #999;" onclick="closeModal()">&times;</button>
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" id="qSearch" class="form-control" placeholder="ابحث عن سؤال..." onkeyup="filterQuestions()">
            </div>
            <div class="modal-body" id="qModalBody">
                </div>
            <div class="modal-footer">
                <div>
                    <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll(this)" style="transform: scale(1.3); margin-left: 5px; cursor:pointer;">
                    <label for="selectAllChk" style="font-weight: bold; cursor: pointer;">تحديد الكل المتاح</label>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-cancel" style="width:auto;" onclick="closeModal()">إلغاء</button>
                    <button class="btn btn-save" style="width:auto;" onclick="importSelectedQuestions()">استيراد المحددة (<span id="selectedCount">0</span>)</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, get, set, child, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // 1. إعدادات Firebase الصريحة
        const myConfig = {
            apiKey: 'AIzaSyCdqYrVFspJ4rZwidfaPtc9PYpNlQQm09k',
            authDomain: 'amgg-81ac3.firebaseapp.com',
            databaseURL: 'https://amgg-81ac3-default-rtdb.firebaseio.com',
            projectId: 'amgg-81ac3',
            storageBucket: 'amgg-81ac3.firebasestorage.app',
            messagingSenderId: '284879336757',
            appId: '1:284879336757:web:1f42836c2382d11b73087c'
        };

        const configToUse = (typeof __firebase_config !== 'undefined') 
                            ? JSON.parse(__firebase_config) 
                            : myConfig;

        let app, auth, db, storage;
        try {
            app = initializeApp(configToUse);
            auth = getAuth(app);
            db = getDatabase(app);
            storage = getStorage(app);
            document.getElementById('yearSelect').innerHTML = '<option disabled selected>-- جاري الاتصال بقاعدة البيانات... --</option>';
        } catch (error) {
            console.error("Firebase Init Error:", error);
            document.getElementById('yearSelect').innerHTML = '<option disabled>خطأ في تهيئة Firebase</option>';
        }

        let questionCounter = 0;
        let currentUser = null;
        let loadedQuestions = []; // مصفوفة لحفظ الأسئلة المستوردة من الملف

        window.addQuestionUI = addQuestionUI;
        window.saveExam = saveExam;
        window.removeQuestion = removeQuestion;
        window.previewImage = previewImage;
        
        // تصدير دوال الاستيراد
        window.handleJsonFile = handleJsonFile;
        window.renderQuestionsModal = renderQuestionsModal;
        window.updateSelectedCount = updateSelectedCount;
        window.closeModal = closeModal;
        window.importSelectedQuestions = importSelectedQuestions;
        window.filterQuestions = filterQuestions;
        window.toggleSelectAll = toggleSelectAll;
        window.toggleCheckbox = toggleCheckbox;

        // 2. المصادقة
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch(e) { 
                console.error("Auth failed", e);
                document.getElementById('yearSelect').innerHTML = '<option disabled>خطأ في تسجيل الدخول</option>';
            }
        };

        // ================= مراقبة حالة المستخدم وتحميل البيانات =================
        onAuthStateChanged(auth, async (user) => {
            const saveBtn = document.getElementById('saveBtn');
            const yearSelect = document.getElementById('yearSelect');

            if (user) {
                currentUser = user;
                saveBtn.disabled = false;
                saveBtn.classList.remove('btn-disabled');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> حفظ الامتحان';
                
                yearSelect.innerHTML = '<option value="" disabled selected>-- جاري التحقق من الصلاحيات (tea)... --</option>';
                
                try {
                     const userTeaRef = ref(db, `tea/${user.uid}`);
                     const teaSnapshot = await get(userTeaRef);
                     
                     if (teaSnapshot.exists()) {
                         yearSelect.innerHTML = '<option value="" disabled selected>-- اختر السنة/المدرس --</option>';
                         
                         const teaVal = teaSnapshot.val();
                         let teachers = [];
                         
                         if (typeof teaVal === 'string') {
                             teachers = teaVal.split('.').map(t => t.trim()).filter(t => t !== '');
                         } else {
                             teachers = [String(teaVal)];
                         }

                         teachers.forEach(t => {
                            let opt = document.createElement('option');
                            opt.value = t; opt.textContent = t;
                            yearSelect.appendChild(opt);
                         });

                         yearSelect.addEventListener('change', (e) => loadMonths(e.target.value));
                         
                         if (teachers.length === 1) {
                             yearSelect.value = teachers[0];
                             loadMonths(teachers[0]);
                         }

                         addQuestionUI();
                     } else {
                         yearSelect.innerHTML = '<option disabled>حسابك غير مسجل كمدرس (tea)</option>';
                     }
                } catch (e) {
                    console.error("Error fetching teacher data:", e);
                    if (e.message && e.message.includes("permission_denied")) {
                        yearSelect.innerHTML = '<option disabled style="color:red">خطأ: لا تملك صلاحية القراءة (تأكد من Rules)</option>';
                        alert("عفواً، قاعدة البيانات ترفض الوصول. يرجى التأكد من تعديل الـ Realtime Database Rules في Firebase Console.");
                    } else {
                        yearSelect.innerHTML = '<option disabled>حدث خطأ أثناء جلب البيانات</option>';
                    }
                }
            } else {
                yearSelect.innerHTML = '<option disabled>يرجى تسجيل الدخول</option>';
            }
        });

        initAuth();

        // ================= دالة تحميل الشهور =================
        async function loadMonths(yearKey) {
            const monthSelect = document.getElementById('monthSelect');
            monthSelect.innerHTML = '<option value="" disabled selected>جاري التحميل...</option>';
            monthSelect.disabled = true;

            try {
                const monthsRef = ref(db, `months/${yearKey}`);
                const snapshot = await get(monthsRef);
                monthSelect.innerHTML = '<option value="" disabled selected>-- اختر الشهر --</option>';

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const arr = Object.entries(data).map(([k, v]) => ({id: k, ...v}));
                    arr.sort((a, b) => (a.order || 999) - (b.order || 999));
                    
                    arr.forEach(m => {
                        let opt = document.createElement('option');
                        opt.value = m.id; opt.textContent = m.name;
                        monthSelect.appendChild(opt);
                    });
                    monthSelect.disabled = false;
                } else {
                    monthSelect.innerHTML = '<option disabled>لا توجد شهور مضافة</option>';
                }
            } catch (e) {
                console.error(e);
                if (e.message && e.message.includes("permission_denied")) {
                    monthSelect.innerHTML = '<option disabled>خطأ صلاحيات (Rules)</option>';
                } else {
                    monthSelect.innerHTML = '<option disabled>خطأ في الاتصال</option>';
                }
            }
        }

        // ================= دوال الواجهة للأسئلة =================
        function addQuestionUI() {
            questionCounter++;
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'card question-card';
            div.setAttribute('data-id', questionCounter);
            
            div.innerHTML = `
                <div class="question-header">
                    <span class="question-title">سؤال رقم ${questionCounter}</span>
                    <button class="delete-q-btn" onclick="removeQuestion(this)"><i class="fas fa-trash"></i> حذف</button>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control q-text" placeholder="نص السؤال">
                </div>
                <div class="form-group">
                    <label style="font-size:13px; color:#666;"><i class="fas fa-image"></i> صورة السؤال (اختياري)</label>
                    <input type="file" class="q-image-input" accept="image/*" onchange="previewImage(this)">
                    <img class="preview-img">
                </div>
                <label style="font-size:14px; font-weight:bold;">الخيارات (اختر الإجابة الصحيحة):</label>
                <div class="options-grid">
                    ${[0, 1, 2, 3].map(i => `
                        <div class="option-item">
                            <input type="radio" name="correct_q_${questionCounter}" value="${i}" ${i===0 ? 'checked' : ''}>
                            <input type="text" class="q-option" placeholder="الخيار ${i+1}">
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        }

        function removeQuestion(btn) {
            btn.closest('.question-card').remove();
        }

        function previewImage(input) {
            const img = input.parentElement.querySelector('.preview-img');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                img.style.display = 'none';
            }
        }

        // ================= دوال استيراد الأسئلة من ملف JSON =================
        function handleJsonFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingText.innerText = 'جاري قراءة الملف...';
            loadingOverlay.style.display = 'flex';

            const reader = new FileReader();
            reader.onload = function(e) {
                loadingOverlay.style.display = 'none';
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.questions && Array.isArray(data.questions)) {
                        loadedQuestions = data.questions;
                    } else if (Array.isArray(data)) {
                        loadedQuestions = data;
                    } else {
                        alert('صيغة الملف غير مدعومة. يجب أن يحتوي الملف على مصفوفة أسئلة.');
                        return;
                    }
                    renderQuestionsModal();
                } catch (err) {
                    alert('حدث خطأ أثناء قراءة الملف. تأكد من أنه بصيغة JSON صحيحة.\n' + err.message);
                }
                event.target.value = ''; // Reset input to allow selecting same file again
            };
            reader.onerror = function() {
                loadingOverlay.style.display = 'none';
                alert('تعذر قراءة الملف.');
            };
            reader.readAsText(file);
        }

        function renderQuestionsModal() {
            const modal = document.getElementById('qModal');
            const body = document.getElementById('qModalBody');
            document.getElementById('selectedCount').innerText = '0';
            document.getElementById('qSearch').value = '';
            document.getElementById('selectAllChk').checked = false;
            
            let html = '';
            loadedQuestions.forEach((q, index) => {
                let choicesHtml = '';
                if(q.choices) {
                    choicesHtml = q.choices.map(c => {
                        const isCorrect = (String(c).trim() === String(q.correct_answer).trim());
                        return `<span class="q-choice-badge ${isCorrect ? 'correct-badge' : ''}">${c}</span>`;
                    }).join('');
                }
                
                html += `
                <div class="q-list-item" data-index="${index}" onclick="toggleCheckbox('q_chk_${index}', event)">
                    <input type="checkbox" class="q-checkbox" id="q_chk_${index}" value="${index}" onchange="updateSelectedCount()">
                    <div class="q-list-details">
                        <label class="q-list-title">${q.question}</label>
                        <div class="q-list-choices">
                            ${choicesHtml}
                        </div>
                    </div>
                </div>
                `;
            });
            body.innerHTML = html;
            modal.style.display = 'flex';
        }

        function toggleCheckbox(id, event) {
            if(event.target.tagName.toLowerCase() !== 'input') {
                const chk = document.getElementById(id);
                chk.checked = !chk.checked;
                updateSelectedCount();
            }
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll('.q-checkbox:checked').length;
            document.getElementById('selectedCount').innerText = selected;
        }

        function toggleSelectAll(checkbox) {
            const items = document.querySelectorAll('.q-list-item');
            items.forEach(item => {
                if (item.style.display !== 'none') {
                    const chk = item.querySelector('.q-checkbox');
                    chk.checked = checkbox.checked;
                }
            });
            updateSelectedCount();
        }

        function closeModal() {
            document.getElementById('qModal').style.display = 'none';
        }

        function filterQuestions() {
            const term = document.getElementById('qSearch').value.toLowerCase();
            const items = document.querySelectorAll('.q-list-item');
            items.forEach(item => {
                const text = item.querySelector('.q-list-title').innerText.toLowerCase();
                if (text.includes(term)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
            document.getElementById('selectAllChk').checked = false;
        }

        function importSelectedQuestions() {
            const checkboxes = document.querySelectorAll('.q-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('الرجاء تحديد سؤال واحد على الأقل.');
                return;
            }
            
            checkboxes.forEach(chk => {
                const index = chk.value;
                const qData = loadedQuestions[index];
                addQuestionFromData(qData);
            });
            
            closeModal();
        }

        function addQuestionFromData(qData) {
            addQuestionUI(); // إنشاء كارت سؤال جديد
            
            const container = document.getElementById('questionsContainer');
            const cards = container.querySelectorAll('.question-card');
            const latestCard = cards[cards.length - 1]; 
            
            const qTextInput = latestCard.querySelector('.q-text');
            qTextInput.value = qData.question || "";
            
            const optionInputs = latestCard.querySelectorAll('.q-option');
            const radios = latestCard.querySelectorAll('input[type="radio"]');
            
            // إعادة ضبط جميع الاختيارات
            radios.forEach(r => r.checked = false);
            
            let matchedCorrect = false;

            for(let i = 0; i < 4; i++) {
                if (qData.choices && qData.choices[i] !== undefined) {
                    optionInputs[i].value = qData.choices[i];
                    // مقارنة الإجابة وتحديد الخيار الصحيح
                    if (qData.correct_answer !== undefined && String(qData.choices[i]).trim() === String(qData.correct_answer).trim()) {
                        radios[i].checked = true;
                        matchedCorrect = true;
                    }
                }
            }
            
            // وضع الافتراضي على الخيار الأول إذا لم يتطابق شيء
            if (!matchedCorrect && qData.correct_answer !== undefined) {
               radios[0].checked = true; 
            }
        }

        // ================= دالة الحفظ =================
        async function saveExam() {
            if (!currentUser) return alert('يرجى إعادة تسجيل الدخول');

            const title = document.getElementById('examTitle').value.trim();
            const duration = document.getElementById('examDuration').value.trim();
            const yearKey = document.getElementById('yearSelect').value;
            const monthKey = document.getElementById('monthSelect').value;
            const qCards = document.querySelectorAll('.question-card');

            if (!title || !duration || !yearKey || !monthKey) {
                return alert('يرجى التأكد من إدخال البيانات الأساسية.');
            }
            if (qCards.length === 0) {
                return alert('يجب إضافة سؤال واحد على الأقل.');
            }

            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.style.display = 'flex';

            try {
                const examId = Date.now().toString() + '_' + Math.floor(Math.random() * 1000); 
                const questionsData = [];

                for (let i = 0; i < qCards.length; i++) {
                    loadingText.innerText = `جاري رفع السؤال ${i + 1}...`;
                    
                    const card = qCards[i];
                    const qText = card.querySelector('.q-text').value.trim();
                    const optionsInputs = card.querySelectorAll('.q-option');
                    const correctRadio = card.querySelector('input[type="radio"]:checked');
                    const imageInput = card.querySelector('.q-image-input');

                    if (!qText) throw new Error(`السؤال رقم ${i+1} فارغ.`);
                    
                    const options = [];
                    optionsInputs.forEach(opt => options.push(opt.value.trim()));
                    if(options.some(o => o === "")) throw new Error(`أكمل الخيارات في السؤال ${i+1}.`);

                    const correctIndex = parseInt(correctRadio.value);
                    const correctAnswerText = options[correctIndex];

                    let imageUrl = null;

                    if (imageInput.files.length > 0) {
                        const file = imageInput.files[0];
                        const path = `exams/${examId}/question_${i}_${Date.now()}.jpg`;
                        const imgRef = storageRef(storage, path);
                        const metadata = { contentType: file.type };
                        
                        const snapshot = await uploadBytes(imgRef, file, metadata);
                        imageUrl = await getDownloadURL(snapshot.ref);
                    }

                    const qObj = {
                        question: qText,
                        options: options,
                        correctAnswer: correctAnswerText,
                    };
                    if (imageUrl) qObj.imageUrl = imageUrl;

                    questionsData.push(qObj);
                }

                loadingText.innerText = 'جاري حفظ بيانات الامتحان...';

                const examData = {
                    title: title,
                    duration: parseInt(duration),
                    monthKey: monthKey,
                    questions: questionsData,
                    createdAt: serverTimestamp(),
                    createdBy: currentUser.uid 
                };

                await set(ref(db, `exams/${yearKey}/${examId}`), examData);

                loadingText.innerText = 'تم الحفظ!';
                setTimeout(() => {
                    alert('✅ تم حفظ الامتحان بنجاح!');
                    window.location.reload();
                }, 1000);

            } catch (error) {
                console.error("Save Error:", error);
                
                if (error.message && error.message.includes("permission_denied")) {
                    alert('❌ خطأ: تم رفض الحفظ (Permission Denied). يرجى التأكد من أنك تملك صلاحية التعديل على هذه السنة الدراسية.');
                } else {
                    alert('❌ خطأ: ' + error.message);
                }
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }
    </script>
</body>
